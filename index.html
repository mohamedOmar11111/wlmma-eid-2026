<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WLMMA // ONYX COMMAND // RIYADH STRIKE</title>
    
    <!-- External Libs -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Cairo:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg: #000000;
            --primary: #FFD700; /* Gold */
            --accent: #00ff9d;  /* Neon Green */
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 255, 157, 0.2);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; overflow: hidden;
            touch-action: manipulation;
        }

        [lang="ar"] { font-family: 'Cairo', sans-serif; }

        /* --- NEURAL BACKGROUND --- */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; opacity: 0.3; pointer-events: none;
        }

        /* --- TACTICAL GRID --- */
        #grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
        }

        /* --- LANG SWITCHER --- */
        .lang-switcher {
            position: fixed; top: calc(15px + env(safe-area-inset-top)); right: 15px; z-index: 2500;
            display: flex; gap: 6px;
        }
        .lang-btn {
            background: rgba(0,0,0,0.85); border: 1px solid var(--border);
            color: #555; padding: 5px 10px; border-radius: 4px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(15px);
        }
        .lang-btn.active { color: var(--accent); border-color: var(--accent); }

        /* --- AUTH OVERLAY --- */
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1s ease; padding: 20px;
        }

        .auth-card {
            background: var(--glass); border: 1px solid var(--border);
            backdrop-filter: blur(40px); padding: 35px 25px; border-radius: 24px;
            text-align: center; width: 90%; max-width: 300px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .system-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
            letter-spacing: 2px; color: var(--primary); margin-bottom: 12px;
            text-transform: uppercase; opacity: 0.8;
        }

        input {
            width: 100%; background: rgba(0,0,0,0.8); border: 1px solid var(--border);
            padding: 12px; border-radius: 8px; color: #fff; font-size: 0.85rem;
            margin-bottom: 10px; outline: none; box-sizing: border-box;
            text-align: center; font-family: 'JetBrains Mono', monospace;
        }
        input:focus { border-color: var(--accent); }

        .btn-unlock {
            width: 100%; background: var(--primary); color: #000;
            padding: 12px; border-radius: 8px; border: none;
            font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; font-size: 0.8rem;
        }

        .btn-booking {
            background: var(--accent); color: #000; border: none; width: 100%;
            padding: 12px; border-radius: 6px; font-weight: 900; cursor: pointer;
            margin-top: 15px; text-transform: uppercase; font-size: 0.7rem;
        }

        /* --- MAP INTERFACE --- */
        #map-ui { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #map {
            width: 100%; height: 100%; background: #000;
            filter: invert(100%) hue-rotate(180deg) brightness(1.1) contrast(1.4) saturate(0);
            z-index: 1;
        }

        .tactical-header {
            position: absolute; top: calc(15px + env(safe-area-inset-top)); left: 15px; z-index: 500;
            background: rgba(0,0,0,0.9); border: 1px solid var(--accent);
            padding: 8px 15px; border-radius: 4px; backdrop-filter: blur(10px);
            max-width: calc(100% - 120px);
        }

        .sidebar {
            position: absolute; right: 20px; top: 100px; bottom: 20px;
            width: 260px; z-index: 500; background: rgba(0,0,0,0.95);
            border: 1px solid var(--accent); border-radius: 5px;
            padding: 25px; backdrop-filter: blur(15px);
            display: flex; flex-direction: column; 
            transform: translateX(400px);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar {
                right: 0; left: 0; top: auto; bottom: 0;
                width: 100%; height: auto; max-height: 38vh; 
                border-radius: 20px 20px 0 0;
                transform: translateY(100%); border-left: none; border-right: none;
                padding: 25px 20px calc(20px + env(safe-area-inset-bottom)) 20px; 
                box-sizing: border-box;
            }
            body.lang-ar .sidebar { left: 0; right: 0; transform: translateY(100%); }
            .sidebar.active { transform: translateY(0) !important; }
            
            .tactical-header { top: calc(65px + env(safe-area-inset-top)); left: 12px; width: auto; padding: 6px 12px; }
            body.lang-ar .tactical-header { left: auto; right: 12px; }
            
            h1 { font-size: 1.4rem !important; margin-bottom: 20px !important; }
            h2 { font-size: 0.9rem !important; }
            .auth-card { padding: 30px 20px; width: 80%; max-width: 280px; }
            .system-tag { font-size: 0.5rem; }
            input { padding: 10px; font-size: 0.8rem; margin-bottom: 8px; }
            .btn-unlock { padding: 10px; font-size: 0.75rem; }
        }

        /* --- GLOWING DOT MARKERS --- */
        .pulsing-dot {
            width: 18px; height: 18px; background: var(--accent);
            border-radius: 50%; border: 3px solid #000;
            box-shadow: 0 0 15px var(--accent);
            animation: orb-pulse 2s infinite;
        }
        @keyframes orb-pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 12px rgba(0, 255, 157, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.7); }
        }

        .footer-branding {
            position: fixed; bottom: calc(10px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
            z-index: 400; font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem; color: var(--primary); letter-spacing: 2px; font-weight: 900;
            text-align: center; width: 100%; pointer-events: none; opacity: 0.6;
        }

        @media (max-width: 768px) { .footer-branding { display: none; } }

        .close-sidebar {
            display: none; position: absolute; top: 12px; right: 18px;
            font-size: 1.6rem; color: var(--accent); cursor: pointer;
            padding: 5px; z-index: 600;
        }
        @media (max-width: 768px) { .close-sidebar { display: block; } body.lang-ar .close-sidebar { right: auto; left: 18px; } }

    </style>
</head>
<body id="main-body">

    <canvas id="bg-canvas"></canvas>
    <div id="grid-overlay"></div>

    <div class="lang-switcher">
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">AR</button>
    </div>

    <!-- AUTHENTICATION -->
    <div class="auth-overlay" id="auth">
        <div class="auth-card">
            <div class="system-tag" id="auth-tag">Secure Access // WLMMA HQ</div>
            <h1 style="margin: 0 0 25px 0; font-size: 1.8rem; font-weight: 900;" id="auth-title">IDENTITY</h1>
            <input type="text" id="auth-name" placeholder="FULL NAME">
            <input type="text" id="auth-phone" placeholder="PHONE NUMBER (+966)">
            <button class="btn-unlock" id="btn-establish" onclick="validateAuth()">Establish Link</button>
        </div>
    </div>

    <!-- MAIN UI -->
    <div id="map-ui">
        <div class="tactical-header">
            <div class="system-tag" style="color: var(--accent); margin-bottom: 2px; font-size: 0.45rem;" id="sector-tag">Target Sector: Riyadh</div>
            <h2 style="margin:0; font-weight:900;">
                <span class="en-content">Mission Map</span>
                <span class="ar-content">خريطة المهام</span>
            </h2>
        </div>

        <div id="map"></div>

        <div class="sidebar" id="sidebar">
            <div class="close-sidebar" onclick="closeSidebar()">×</div>
            <div class="system-tag" id="sidebar-tag">Mission Decryption</div>
            <h3 id="mission-title" style="margin:8px 0; color: #fff; font-size: 1rem;">AWAITING SELECTION</h3>
            <p id="mission-desc" style="font-size:0.7rem; color:#888; line-height: 1.4;">Select a pulsing node to access secret mission parameters.</p>
            
            <div id="booking-form-container" style="display:none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px;">
                <div class="system-tag" style="color:var(--primary); font-size: 0.45rem; margin-bottom: 8px;" id="trans-tag">Transmission Channel</div>
                <form id="mission-form" action="https://formspree.io/f/mvzwpjbz" method="POST">
                    <input type="hidden" name="Mission" id="hidden-mission-name">
                    <input type="hidden" name="User_Identity" id="hidden-user-name">
                    <input type="hidden" name="User_Contact" id="hidden-user-phone">
                    <button type="submit" class="btn-booking" id="btn-secure">Secure Mission Spot</button>
                </form>
            </div>

            <div id="logs" style="font-family: 'JetBrains Mono', monospace; font-size: 0.45rem; color: var(--accent); margin-top: auto; padding-top: 15px; opacity: 0.3;">
                > Neural Particles Synced<br>
                > Secure Link Established.
            </div>
        </div>
    </div>

    <div class="footer-branding" id="footer-tag">
        MOHAMED OMAR // THE GROWTH ARCHITECT
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let GLOBAL_USER = "";
        let GLOBAL_PHONE = "";
        let CURRENT_LANG = "en";

        const translations = {
            en: {
                authTag: "Secure Access // WLMMA HQ",
                authTitle: "IDENTITY",
                namePh: "FULL NAME",
                phonePh: "PHONE NUMBER (+966)",
                establish: "Establish Link",
                sector: "Target Sector: Riyadh",
                sidebarTag: "Mission Decryption",
                awaiting: "AWAITING SELECTION",
                selectNode: "Select a pulsing node to access secret mission parameters.",
                transTag: "Transmission Channel",
                secure: "Secure Mission Spot",
                footer: "MOHAMED OMAR // THE GROWTH ARCHITECT",
                logs: "> Neural Particles Synced<br>> Secure Link Established."
            },
            ar: {
                authTag: "وصول آمن // مقر ولمة",
                authTitle: "الهوية",
                namePh: "الاسم الكامل",
                phonePh: "رقم الجوال (+966)",
                establish: "تأسيس الاتصال",
                sector: "القطاع المستهدف: الرياض",
                sidebarTag: "تشفير المهمة",
                awaiting: "في انتظار الاختيار",
                selectNode: "اختر نقطة نابضة للوصول إلى تفاصيل المهمة السرية.",
                transTag: "قناة الإرسال",
                secure: "تأمين مكانك في المهمة",
                footer: "محمد عمر // مهندس النمو",
                logs: "> تم مزامنة الجزيئات<br>> تم إنشاء رابط آمن."
            }
        };

        // --- 1. NEURAL PARTICLES ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.0;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.speedY = Math.random() * 0.2 - 0.1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = '#FFD700'; ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 40; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- 2. AUTHENTICATION ---
        function validateAuth() {
            const name = document.getElementById('auth-name').value;
            const phone = document.getElementById('auth-phone').value;
            if(!name || !phone) return alert(CURRENT_LANG === 'en' ? 'Name and Phone Number required.' : 'الاسم ورقم الجوال مطلوبان.');

            GLOBAL_USER = name;
            GLOBAL_PHONE = phone;

            fetch('https://formspree.io/f/mvzwpjbz', {
                method: 'POST',
                body: JSON.stringify({ name: name, phone: phone, action: "INITIAL_AUTH_ACCESS" }),
                headers: { 'Accept': 'application/json' }
            });

            gsap.to('#auth', { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('map-ui').style.display = 'block';
                initMap();
            }});
        }

        // --- 3. TACTICAL MAP ---
        let map;
        const missions = [
            { name_en: "EID PEAK: EDGE OF THE WORLD", name_ar: "قمة العيد: حافة العالم", coords: [24.9450, 45.9890], desc_en: "The ultimate Eid morning hike. Exclusive 5AM launch.", desc_ar: "هايكنج صباح العيد المثالي. انطلاق حصري 5 فجراً." },
            { name_en: "SECRET EID OASIS", name_ar: "واحة العيد السرية", coords: [24.5500, 46.8500], desc_en: "Hidden water mission. Eid Day 2 only.", desc_ar: "مهمة المياه المخفية. ثاني أيام العيد فقط." },
            { name_en: "DIRIYAH EID NIGHTS", name_ar: "ليالي الدرعية في العيد", coords: [24.7333, 46.5833], desc_en: "Traditional pottery & secret rooftop dinner.", desc_ar: "فخار تقليدي وعشاء سري فوق السطح." },
            { name_en: "EID SKYDROP", name_ar: "إسقاط جوي في العيد", coords: [24.8500, 46.7000], desc_en: "Skyline acquisition. Eid release at 12,000ft.", desc_ar: "الاستحواذ على الأفق. إطلاق عيد 12,000 قدم." },
            { name_en: "THE EID REVEAL", name_ar: "كشف العيد", coords: [24.4100, 46.2500], desc_en: "Mystery location revealed 24h before Eid.", desc_ar: "موقع غامض يتم الكشف عنه قبل العيد بـ 24 ساعة." }
        ];

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false, tap: true }).setView([24.7136, 46.6753], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            renderMarkers();
        }

        function renderMarkers() {
            missions.forEach(m => {
                const icon = L.divIcon({ className: 'custom-orb', html: "<div class='pulsing-dot'></div>", iconSize: [20, 20] });
                L.marker(m.coords, {icon: icon}).addTo(map).on('click', () => {
                    document.getElementById('mission-title').innerText = CURRENT_LANG === 'en' ? m.name_en : m.name_ar;
                    document.getElementById('mission-desc').innerText = CURRENT_LANG === 'en' ? m.desc_en : m.desc_ar;
                    document.getElementById('hidden-mission-name').value = m.name_en;
                    document.getElementById('hidden-user-name').value = GLOBAL_USER;
                    document.getElementById('hidden-user-phone').value = GLOBAL_PHONE;
                    document.getElementById('booking-form-container').style.display = 'block';
                    
                    const sidebar = document.getElementById('sidebar');
                    sidebar.classList.add('active');
                    if(window.innerWidth > 768) {
                        gsap.to(sidebar, { x: 0, duration: 0.8, ease: "power3.out" });
                    } else {
                        gsap.to(sidebar, { y: 0, duration: 0.6, ease: "power3.out" });
                    }
                });
            });
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('active');
            if(window.innerWidth > 768) {
                gsap.to(sidebar, { x: 400, duration: 0.8, ease: "power3.in" });
            } else {
                gsap.to(sidebar, { y: '100%', duration: 0.6, ease: "power3.in" });
            }
        }

        function setLang(lang) {
            CURRENT_LANG = lang;
            const body = document.getElementById('main-body');
            const btnEn = document.getElementById('btn-en');
            const btnAr = document.getElementById('btn-ar');
            const t = translations[lang];

            if (lang === 'ar') {
                body.classList.add('lang-ar'); body.setAttribute('dir', 'rtl');
                btnAr.classList.add('active'); btnEn.classList.remove('active');
            } else {
                body.classList.remove('lang-ar'); body.setAttribute('dir', 'ltr');
                btnEn.classList.add('active'); btnAr.classList.remove('active');
            }

            document.getElementById('auth-tag').innerText = t.authTag;
            document.getElementById('auth-title').innerText = t.authTitle;
            document.getElementById('auth-name').placeholder = t.namePh;
            document.getElementById('auth-phone').placeholder = t.phonePh;
            document.getElementById('btn-establish').innerText = t.establish;
            document.getElementById('sector-tag').innerText = t.sector;
            document.getElementById('sidebar-tag').innerText = t.sidebarTag;
            document.getElementById('mission-title').innerText = t.awaiting;
            document.getElementById('mission-desc').innerText = t.selectNode;
            document.getElementById('trans-tag').innerText = t.transTag;
            document.getElementById('btn-secure').innerText = t.secure;
            document.getElementById('footer-tag').innerText = t.footer;
            document.getElementById('logs').innerHTML = t.logs;
        }
    </script>
</body>
</html>
